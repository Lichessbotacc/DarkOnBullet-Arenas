name: Create Lichess Tournaments

on:
  schedule:
    - cron: "0 */2 * * *" # Alle 2 Stunden (UTC)
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Create tournaments
        env:
          OAUTH_TOKEN: ${{ secrets.OAUTH_TOKEN }}
        run: npm start
